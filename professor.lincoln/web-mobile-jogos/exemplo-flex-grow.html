<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exemplo de Retenção Visual com flex-grow</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .item {
      background: #4a90e2;
      color: white;
      padding: 20px;
      border-radius: 8px;
      font-size: 18px;
      text-align: center;
    }

    /* Aqui está a mágica da retenção visual */
    .item-1 {
      flex-grow: 1; /* cresce pouco */
    }

    .item-2 {
      flex-grow: 2; /* cresce mais */
    }

    .item-3 {
      flex-grow: 1; /* cresce pouco */
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="item item-1">Item 1</div>
    <div class="item item-2">Item 2</div>
    <div class="item item-3">Item 3</div>
  </div>

</body>
</html>
