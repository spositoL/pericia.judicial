<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exemplo Flexbox Horizontal e Vertical</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* --- LAYOUT HORIZONTAL --- */
    .container-horizontal {
      display: flex;
      flex-direction: row;        /* em linha */
      justify-content: center;
      align-items: center;
      gap: 20px;
      height: 50vh;
      background: #e8f0fe;
      border-bottom: 4px solid #ccc;
    }

    /* --- LAYOUT VERTICAL --- */
    .container-vertical {
      display: flex;
      flex-direction: column;     /* em coluna */
      justify-content: center;
      align-items: center;
      gap: 20px;
      height: 50vh;
      background: #fef3e8;
    }

    .item {
      background: #4a90e2;
      color: white;
      padding: 20px;
      font-size: 20px;
      border-radius: 8px;
      width: 120px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Seção horizontal -->
  <div class="container-horizontal">
    <div class="item">Item A</div>
    <div class="item">Item B</div>
    <div class="item">Item C</div>
  </div>

  <!-- Seção vertical -->
  <div class="container-vertical">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
  </div>

</body>
</html>
